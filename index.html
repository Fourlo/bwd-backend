<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login and register</title>
    <link rel="stylesheet" href="/css/style.css">
    <link rel="stylesheet" href="/css/responsive.css">
    <link rel="stylesheet" href="/css/reset.css">
</head>
<body>
    <div class="container">

        <!-- Login -->
        <div class="form-container" id="login-form">
            <h1>LOGIN</h1>
            <form>
                <!--  -->
                <div class="form-group">
                    <label for="login-email">Email</label>
                    <input type="email" id="login-email" placeholder="Nhập email">
                </div>
                
                <!--  -->
                <div class="form-group">
                    <label for="login-password">Mật khẩu</label>
                    <input type="password" id="login-password" placeholder="Nhập mật khẩu">

                    <div class="forgot-password">
                        <a href="#" id="forgot-password">Quên mật khẩu</a>
                    </div>
                </div>

                <!--  -->
                <button type="submit" class="btn btn-primary">Đăng nhập</button>
            </form>

            <div class="form-footer">
                <button id="switch-to-signup" class="btn btn-secondary"> Đăng ký</button>
            </div>
        </div>

        <!-- Register --> 
         <div class="form-container hidden" id="register-form">
            <h1>Đăng ký</h1>
            <form >
                <!--  -->
                <div class="form-group">
                    <label for="signup-email">Email</label>
                    <input type="email" id="signup-email" placeholder="Nhập email">
                </div>

                <!--  -->
                <div class="form-group">
                    <label for="signup-password">Password</label>
                    <input type="password" id="signup-password" placeholder="Nhập mật khẩu">
                </div>

                <!--  -->
                <div class="form-group">
                    <label for="signup-confirm-password">Xác nhận password</label>
                    <input type="password" id="signup-confirm-password" placeholder="Nhập lại mật khẩu">
                </div>

                <!--  -->
                <button type="submit" class="btn btn-primary"> Đăng ký</button>
            </form>
            <div class="form-footer">
                <button id="switch-to-login" class="btn btn-secondary"> Đăng nhập</button>
            </div>
         </div>
    </div>

    <script src="js/main.js"></script>
</body>
</html>
